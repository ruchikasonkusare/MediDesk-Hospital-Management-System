{% extends 'core/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}<strong>{{ title }}</strong>{% endblock %}
{% block topbar_actions %}<a href="/staff/" class="btn btn-secondary">← Staff</a>{% endblock %}
{% block content %}
<div style="max-width:600px;">
<form method="post">{% csrf_token %}
<div class="card" style="margin-bottom:16px;">
  <div class="card-header"><div class="card-title">Account Info</div></div>
  <div class="card-body">
    <div class="form-grid">
      <div class="form-group"><label class="form-label required">Username</label><input type="text" name="username" class="form-input" required autocomplete="off"></div>
      <div class="form-group"><label class="form-label required">Password (min 6 chars)</label><input type="password" name="password" class="form-input" required autocomplete="new-password"></div>
      <div class="form-group"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-input"></div>
      <div class="form-group"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-input"></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-input"></div>
      <div class="form-group"><label class="form-label">Phone (10 digits)</label><input type="text" name="phone" class="form-input" maxlength="10" pattern="[0-9]{10}"></div>
      <div class="form-group full"><label class="form-label required">Role</label>
        <select name="role" class="form-input">{% for val,label in roles %}<option value="{{ val }}">{{ label }}</option>{% endfor %}</select>
      </div>
    </div>
  </div>
</div>
<div style="display:flex;gap:12px;"><button type="submit" class="btn btn-primary">Create Staff Member</button><a href="/staff/" class="btn btn-secondary">Cancel</a></div>
</form>
</div>
{% endblock %}
